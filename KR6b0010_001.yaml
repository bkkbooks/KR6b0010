body:
  text: 九總釋名題題為十別解文義二初解序三一依經序題大乘二序主朝代唐憲三正釋序文三一發語歎世二一正歎情欲噫夫二結迷不返二一歎自不能明豈復二結自不能救不有二幸遇真詮四一至人傳法迷流得度由是二妙觀真諦生滅歸如不滅三真理難解必借能詮然則四結顯聖教歸恩於佛此蓋三述明來歷二一西域來源二一牒定經名大乘二釋迦親說釋迦二東土來源三一梵本初來之代其梵二聖主披閲合機朕嗣三傳詔翻譯流通三一標定譯意夫如二義學翻經乃出三結歸朝代嗟歎二注經二一譯人罽賓二經文三一序分二一品名序品二經文二一通序四一標信與聞如是二時主及處一時三廣列聽衆八一二乘聲聞衆五一舉類與大二標數三萬三歎德皆是四列名其名五結衆各禮二大乘菩薩衆五一舉類復有二標數八萬三歎德三一總歎位鄰妙覺皆是二別歎萬德莊嚴二一總歎百福二別歎六一歎圓光破暗德身光二歎兩智兼利德二一歎實智自利德智慧二歎權智利他德然大三歎和光妙用德自在四歎事上利下德經無五歎破魔成道德披精六歎覺悟羣品德吹大三結歎不久成佛此諸四列名其名五結衆如是三天龍八部衆八一天衆二一欲界諸天衆四一標數舉類復有二次第列名其名三彰本歎德悉皆四結顯天色衆各與二色界諸天衆四一標數舉類復有二次第列名其名三彰本歎德悉皆四結顯天色衆各與二龍衆三一標數舉類二次第列名三歎德結衆三藥叉衆三一標數舉類二次第列名三歎德結衆四乾達婆衆三一標數舉類二次第列名三歎德結衆五阿修羅衆三一標數舉類二次第列名三歎德結衆六迦樓羅衆三一標數舉類二次第列名三歎德結衆七緊那羅衆三一標數舉類二次第列名三歎德結衆八摩睺羅伽三一標數舉類二次第列名三歎德結衆四輪王士庶衆四一諸輪王衆五一輪王雲集復有二七寶相隨及與三獻供讚佛各執四白佛述志而白五作禮結衆作是二諸國王衆五一舉類復有二列名迦毗三歎德悉皆四來儀為聽五結衆各與三王夫人衆五一舉類復有二列名韋提三歎德己能四來儀以本五結衆各與四僧俗等衆二一標類顯誠復有二結領同衆各與五發心外道衆二一舉類顯誠復有二結領同衆各與六非人鬼神衆二一舉類顯誠復有二結領同衆各與七烏獸王屬衆三一標類舉誠復有二呈因欲果而白三結領同衆各與八琰魔王吏衆二一標類舉誠復有二結領同衆亦與四總結衆集各禮二別序二正宗三流通二別序二卷一之末一主賓會集二一序佛威儀爾時二序衆欽誠為諸二發起源流二一如來正發三一威儀表德時薄二定感諸天二一入定能感入有二諸天獻供三一無色諸天供時無二色界諸天供色界三欲界諸天供六欲三婆伽現瑞二一變定施通二一變定爾時二施通二一總標現大二別釋二一變相嚴淨謂動二羣生獲益滋長二正明現瑞三一如來放光爾時二光中現相二一現六凡相二一依報世界相二一總相此金二別相乃至二正報衆生相罪業二現諸聖相二一總標又此二別列三一別現釋迦因果相二一總明因果釋迦二別明因果二一明經歷之時於其二明所行之道二一通明諸行所有二別現因果三一往昔因行相乃於二現世始終相六一受生相或現二出家相捨後三苦行相六年四破魔相降諸五成佛相得阿六總結光現有如三八處靈塔相三一總標又此二別列八一降生處寶塔拘娑二成佛處寶塔摩伽三初轉法處寶塔波羅四辨外道處寶塔舍衛五神異處寶塔安達六說大乘處寶塔摩竭七現疾處寶塔毗舍八圓寂處寶塔拘尸三結顯如是二別結釋迦因果相如是三總明諸聖差別相又十三衆喜請法三一序發心一切二序作念時諸三序請法惟願二大士傍通二一長行二一經家序德三一標名行爾時二述聖位於賢三顯聖德四向二發言警衆二一正以警衆二一自陳己過警策羣心四一陳發心時遠我於二陳歷事諸佛歷事三陳所遇勝會曾有四陳今遇光相未嘗二勸衆欽誠速求大法二一正以勸衆五一勸衆誠心瞻仰惟願二擬佛定起說法從定三述佛慈悲薰修是諸四擬佛定說心地世間五結勸速求大法告諸二徵釋所以二一徵起所以二釋義五一釋光色殊勝今日二釋佛意甚深佛所三釋凡夫迷流汝等四釋諸佛修證諸佛五結顯示勝緣三世二大衆欽誠是知二偈頌二一標能頌之人爾時二明所頌之偈二一頌主賓會集二一總讚佛德敬禮二別讚佛德十二一讚佛神通普用二讚佛相好希有三讚佛福智無邊四讚佛因行我觀五讚成正覺因緣六讚佛體用諸佛七讚佛萬德如來八讚佛神應如來九讚佛大悲隨心十讚佛大慈大智十一讚佛難遇如來十二願世隨佛願於二頌發起源流二一頌如來正發二一頌定感諸天二一頌入定能感今者二頌諸天獻供二一總頌聖凡獻供世間二別頌三天獻供四一頌欲界諸天供六欲二頌色界諸天供十八三頌無色諸天供無色四增頌龍王修羅供龍王二頌婆伽現瑞二一頌變定施通二一頌變定時婆二頌施通六種二頌正明現瑞二一頌如來放光𮌎臆二頌光中現相二一頌照依報世界相大聖二頌照正報聖凡相三一頌釋迦因果相二一頌因中苦行相二一歷頌諸相十三一頌割肉救鴿相又現二頌雪山求道相時佛三增頌布髮供佛相昔為四頌捨身救虎相昔為五增頌流水救魚相流水六增頌翹勤讚佛相七日七增頌象王投獵相昔為八增頌施眼相或作九頌鹿王捨身相又作十增頌身施夜叉相為迦十一增頌施妻子相又作十二增頌捨頭目相或為十三頌輪王出家相佛昔二總結全現如是二頌果上靈塔相三一頌總標八塔又此二別頌八塔淨飯三結顯供養如是二增頌造塔獲福相若造三增頌雲集供衆三一頌雲集聖凡十方二頌神力興供各以三頌伽陀讚佛微妙二頌大士請法四一正請轉法惟願二來儀表誠如我三三昧獻供以三四總結供養我等序分已竟第二卷二正宗分四一佛談心地薰修引發四恩應報二一品題報恩二經文二一正談心地熏修三一出定稱歎二一出定爾時二稱歎二一標歎善哉告彌二釋成善意汝等二許說妙法五一顯佛真慈我今二歎法難遇如是三徵釋所以所以四佛離四失然諸五結顯難聞聲聞三觀心成道菩提二引發四恩應報二一長者惡大求小以為知恩報恩二一經家標名歎德爾時二長者自陳己志二一因見惡聞二一明佛讚大乘是諸二述光中所見而作二正述己志二一見佛之儀作是二陳白之言二一陳惡大異口二陳樂小不如二如來廣讚四恩引其回小向大三一通為五百六一讚許說與恩處二一稱歎爾時二誡許諦聽二廣說四恩應報三一總標善男二別顯四一父母恩二一總申名義善男二廣顯深恩三一粗以較量我今二細與分別十一未形之恩世間二將産之恩若産三乳哺之恩若無四憐愛之恩長養五怨言子墮若有六子孝獲福若善七以孝較恩若善八慈愛生天昔有九廣明十德以是十較量貧富善男三結勸行孝是故二衆生恩三一互為父母善男二反恩為怨如是三結勸報恩以是三國王恩三一總標勝德國王二別明勝德十一一諸天護祐三十二正喻國體譬如三德化感祥王失四愛民如子譬如五善惡相關如是六善法同天若有七成就十德以是八百靈潛護大梵九鄰國咸歸若不十惡人神誅若有十一善人獲福若有三總結勝德以是四三寶恩二一總標三寶善男二別明廣示二一如來正示三寶三一佛寶二一正明佛寶三一總標佛德二一修證功德巍巍是諸二警策凡流不覺一切二別述三身二一總標三身大義二一標一體三身善男二明三身大義三一第一佛身第一二第二佛身第二三第三佛身第三二別釋三身差別三一自性身佛善男二受用身佛二一總標二身其受二別明二身二一自受用身五一行滿將欲成道自受二海會尊重供養而不三惑盡究竟成佛爾時四發明真身壽量如是五分別轉識成智二一正明四智差別二一總標四智四智二別明四智四一大圓鏡智一大二平等性智二平三妙觀察智三妙四成所作智四成二結顯功德無量如是二他受用身三一明身土相好說法諸善二明十身說十地法二一總標一切二別列二一分釋前三地第一二例明後七地如是三結顯十身證道如是三變化身佛五一即報垂化諸善二各現成道各於三隨機說法二一總標隨宜為諸二別釋隨宜四一應菩薩為諸二應辟支為求三應聲聞為求四應人天為餘四結屬化身諸如五通釋疑難善男三結顯佛恩二一總示大恩諸善二別明衆德三一明十號以是二顯六德善男三結常利依具二兼釋轉難四一長者以衆生不見為難爾時二如來以盲不見日為喻佛告三以衆生罪障不見合喻佛告四以成就善根之者得見若有二法寶三僧寶二因問重申寶義三結勸善男三長者請問報恩爾時四如來教發大心五長者發心獲益爾時六合會聞法獲益爾時二結勸受持三別為智光二智光發心出家請佛除疑說法三彌勒疑佛往語重問蘭若修證四文殊啓問心地用觀佛果必成二法寶三一舉佛例法諸善二正明法寶二一總舉標列善男二別以釋成四一略釋四義聲名二諸佛所師善男三述己求法善男四廣以喻明是故三結顯深恩善男三僧寶三一總標三種善男二別釋聖凡二一聖僧文殊二凡僧二一具戒說法僧三一據德標名若有二銷釋疑難雖未三會聖真僧如是二毀戒正見僧四一正顯復有二較勝當知三釋疑如鬱四較福若善三總結僧恩如是二因問重申寶義三一長者疑問寶名二一正問爾時二請說願佛二佛以十喻領答二一稱歎能問爾時二十義喻明二一總標十義譬如二別以開明一者三結顯神變無量佛法四如來教發大心三一略舉三種十行佛告二略述三義揀別四一明布施揀真實若有二明親近揀真實若有三明真實揀前二若善四真實能報四恩若善三徵釋真報所以二一徵所以二釋前二二結勸受持二一正勸廣令流布爾時二指明現未功德二一現世增延福壽如是二當來果證菩提三一命終往生內院若命二隨意見佛聞法十方三速證菩提種智速成第三卷二別為智光二一品題報恩二經文四一智光欽誠請法二一經家敘置爾時二智光請法二一先申來意而白二懇請宣說惟願二如來讚善誡述二一讚善誡聽爾時二述誠獲報二一泛述得輪王果報若有二確明智光果報汝大三如來說偈重示二一承前許說我雖二正說偈言二一頌佛聖德三一人天尊勝德最勝二相好神通德具諸三智辨說法德金口二重頌前文二一頌佛談心地熏修自出二頌引發四恩應報二一頌長者惡大求小時諸二頌如來廣讚四恩二一頌佛智甚深二一總標佛智引發我開二別頌權小莫測如來二頌四恩應報二一斥凡愚迷背恩處世間二說四恩令生正見二一總標四恩我為二別釋四恩五一父母恩二一總申名義慈父二廣顯深恩三一頌粗與較量假使二頌細與分別十一一頌未形之恩世間二頌將産之恩若正三頌乳哺之恩若得四頌憐愛之恩慈念五頌怨言子墮若有六頌子孝獲福若有七頌以孝校恩若有八復頌慈愛愍念十月九頌慈愛生天昔有十頌廣明十德一名十一較量貧富何法三頌結勸行孝四一正勸行孝世間二引己勸孝二一正引自己三一修行為母佛昔二為母說法我升三母悟無生令母二兼引目連神通三二福較量當知四慎終追遠五一為子墮苦世人二子迷不知男女三勸修冥福二一明金光拔苦