追釋四性隔調伏一科追釋在後二說調伏三一標定頭陀一心二廣明觀喻二一徵起智光二別釋二一作喻其旃二法合二一形同嬰兒觀智光二三種對治觀二一標三觀出家二釋三觀觀諸三結勸常觀出家三說修習二聞者獲益爾時三佛釋後益三追釋四性二一徵起智光二釋義四一總釋四性衣服二重徵明益諸比三偈頌前科爾時四詳明四性三一明衣服臥具知慚獲益二一長行六一教其知慚生福復次二戒莫邪穢貪求不得三警策貪求墮苦墮於四結勸如法知慚出家五廣明十種勝利十一覆身修善利得十二遠毒修道利二者三相貌遠邪利三者四寶幢尊重利四者五滅罪生福利五者六遠離貪愛利六者七永斷煩惱利七者八消業增善利八者九良田增長利九者十甲胄防害利十者六引證三乘共修智光二偈頌爾時二明乞食除貪十種勝利二一長行三一標徵十利復次二分條別釋十一活命自由益一者二說法起善益二者三化他生福益三者四福智無窮益四者五消慢起敬益五者六當得頂相益六者七住持三寶益七者八戒無希望益八者九平等行慈益九者十佛喜為緣益十者三結略該廣智光二偈頌爾時三明恆服棄藥十種勝利二一長行三一指名標徵復次二正明十利十一息貪正念益一者二觀門成就益二者三遠證禪悅益三者四知足解脫益四者五親近善友益五者六知慚解脫益六者七世間尊重益七者八證得法身益八者九永斷煩惱益九者十得大菩提益十者三結囑流布智光二偈頌爾時三說修習三一如來正教修攝其心二一長行五一教住蘭若復次二引聖證成三世三標徵十德二一標徵其阿二分釋十一威儀自在德一者二離我我所德二者三無愛無畏德三者四三毒遠離德四者五不求五欲德五者六修習佛道德六者七事業易成德七者八易成出世德八者九百千三昧德九者十無礙大智德十者四勸住莫離智光五遇阻作觀若有二偈頌爾時二大士疑問蘭若修證三樂遠離行代佛廣讚三佛釋後益二一勸持流布爾時二正明後益四一所生處益如是二現世獲益而於三後生兜率命終四隨願往生若欲二大士疑問蘭若修證三一品題大乘二經文二一長行六一經家敘儀爾時二述旨疑問世尊三哀請決疑惟願四如來讚許爾時五當機應唯唯然六如來正答四一直斥非當爾時二徵釋所以所以三正明住意善男四存想固志四一念依報無常常作二念正報無常三界三念自身無常我今四承志發願二一總以發願作是二別分等級四一三根發願上根二結顯功德如是三未成厥志若未四結證菩提善男二偈頌二一標章爾時二正頌五一引證令信昔諸二廣明深益若欲三結頌三世三世四通頌三根上根五引巳結證今我三獲益爾時第六卷三樂遠離行代佛廣讚二一離世一品樂遠正讚二一品題離世二經文四一經家敘置爾時二菩薩代宣四一標定徵起出家二誡衆誠聽諸佛三大衆樂聞諸菩四廣為分別三一標住蘭若所為是時二徵起種種恐怖云何三詳明恐怖非一二一略說三一法說衆過或有二喻明毒害三一取喻毒蛇譬如二以法合喻世間三結顯障道無數三引古證成六一飛蛾投火喻過去二羣鹿中箭喻譬如三蜜蜂愛香喻譬如四龍魚貪餌喻譬如五白象貪染喻譬如六總結遠離世間二廣說二一長行八一明恐怖多種境相三一貪酷為因或有二三途為報以是三轉生餘報畢是二明蘭若離怖得果四一總標知怖求脫一切二廣示恐怖之相十九一渴愛追求怖或有二我法二見怖或有三邪疑斷常怖或有四嫉掉不信怖或有五無慚無愧怖或有六忿恨忘失怖或有七不善黑業怖或有八五蓋憎惡怖或有九破戒憂愁怖或有十惡作狂死怖或有十一妄語顛倒怖或有十二惡友五蘊怖或有十三煩惱諸魔怖或有十四無記八難怖或有十五地獄三途怖或有十六三界終墮怖或有十七趣生厭死怖或有十八語言心意怖或有十九總結在纏怖若在三薩多證果之相過去四結勸蘭若修證汝等三住蘭若存想追本二一總標我見為本復次二別釋我見差別一切四反究離過當住若我五正顯離過當住汝等六正明有德當住二一結前起後諸佛二正列衆德若得七喻明蘭若無怖五一略以草木為喻汝等二略以菩薩合喻菩薩三又復以喻合喻觀自四結合如木無怖常應五結成阿耨菩提時諸八廣明法相蘭若復次二偈頌爾時三如來印證爾時四海衆獲益爾時二厭身一品彌勒問觀二厭身一品彌勒問觀二一品題厭身二經文二一問正住蘭若於身何觀二一經家敘置爾時二彌勒正問世尊二如來讚許誡聽當說二一讚誡樂聞爾時二如來正說五一佛與分別二一標作諸觀善男二分別諸觀草九一穢器盛蛇觀當觀二死狗不淨觀出家三蟻臺象破觀出家四芭蕉無實觀出家五如塗附墻觀出家六養蛇取害觀出家七冤家詐親觀出家八水泡起滅觀出家九乾城不實觀出家十影像非真觀出家十一強敵侵掠觀出家十二朽宅崩壞觀出家十三近怨懷怖觀出家十四愛火燒身觀出家十五慈母憐子觀出家十六洗炭無益觀出家十七如油沃薪觀出家十八惡疾多病觀出家十九蟲住無常觀亦如二十瓦石河水觀亦如二十一壓油嬰兒觀亦如二十二蝦蟆如穴觀無救二十三無厭斷常觀恆不二十四無慚死尸觀不生二十五受苦依身觀唯受二十六空聚空寂觀如空二十七空谷船舶觀如谷二十八大車到岸觀亦如二十九總結到岸善男二結成法要爾時三勸令流布若有四究竟成德速能五聞品成行爾時第七卷三彌勒疑佛往語重問蘭若修證二一品題波羅二經文二一彌勒疑問二一經家敘置爾時二正陳疑問四一疑佛今說世尊二引昔證今如來三今昔相違世尊四為衆申請然我二如來決答二一正釋疑問三一長行廣示五一標定兩種菩薩爾時二略敘二種差別在家三分敘二種品格然此四承前叮嚀令觀如是五廣明出家勝法六一深位不拘其處復次二未得須求勝緣若有三指名勸當修學善男四蘭若易證菩提復次五徵釋易滿三度所以六因問重明諸度二一彌勒問施彌勒二如來廣示四一正答檀度佛告二開明諸度九一戒度復次二忍度復次三進度復次四禪度復次五慧度復次六方便度復次七願度復次八力度復次九智度復次三隨機廣開八一重徵八萬四千善男二釋明四種差別汝等三結成根本轉倍善男四結為利他法門如是五自利調伏之行善男六利他調伏之行若有七自敘調伏衆生善男八現未修習除障善男四總結證果皆詣二偈頌重宣二一標章爾時二正頌十一一洪讚三寶超過二彌勒啓問歷劫三許說誡聽我以四分別品格將求五真智利益已獲六未得應修未得七發願常親願我八廣頌諸度八一頌檀度若有二頌戒度堅持三頌忍度伏瞋四頌進度能行五頌禪度出入六頌慧度若欲七頌方便度能知八頌智力兼願觀一九隨機廣開如是十自他廣利八萬十一總結流通大聖三聞品獲益爾時二再答轉問二再答轉問二一品題功德二經文四一彌勒示問三一述承佛語爾時二徵起疑問菩薩三哀請求示惟願二如來開示四一總答一德堪住爾時二徵釋一德源委云何三再徵法喻反釋所以四結前起後廣釋三一結前以是二開後五一深究迷倒根本一切二是人速證菩提若有三勸人供養獲福若善四例出供母功德若復五徵釋當證菩提何以三廣釋二一非機莫住三一邪見貪財莫住復次二憍慢惡法莫住又善三邪見破戒莫住又善二正機當住二一四德當住十一一總持等四德復次二慈悲等四德復次三頭陀等四德復次四持戒等四德復次五布施等四德復次六觀察等四德復次七度生等四德復次八愛樂等四德復次九捨見等四德復次十觀蘊等四德復次十一成就等四德復次二八德當住五一八種三昧復次二八種智慧復次三八種神通復次四八種清淨復次五八種多聞復次三滅後功德二一修習得不退轉爾時二更遇龍華成佛如是四聞品獲益爾時第八卷四文殊啓問心地用觀佛果必成二一品題觀心二經文二一文殊問三一經家敘置爾時二正問心地世尊三哀懇垂慈惟願二如來答七一答問儀式五一經家歎德爾時二如來讚美善哉三誡聽許說諦聽四當機領諾唯然五歎佛四智爾時二正答所問四一總標心地是薄二廣演差別草五一凡夫頓悟此法二菩薩正路此法三諸佛寶宮此法四有情寶藏此法五菩薩智處此法六後身導師此法七滿願寶珠此法八諸佛本源此法九能消惡業此法十從願如印此法十一能度險難此法十二能息苦浪此法十三能救急難此法十四能竭苦海此法十五成佛種子此法十六破暗如炬此法十七助勇如甲此法十八標指如旗此法十九推運如輪此法二十摧惑如幢此法二十一策進如鼓此法二十二警衆如螺此法二十三尊如師子此法二十四師吼降魔此法二十五賞罰如王此法三正教心地善男四斷障成道一切三兼釋轉難四一文殊轉難六一引佛所說爾時二問心何為染法本三述心法本空於三四述五目不覩一切五明從妄生法一切六哀求解說願佛二佛以喻釋二一牒前所問爾時二諸喻類釋我說三深談心法七一釋妄心本空善男二釋真心本寂如是三徵釋離過何以四達悟見真如是五釋心平等一切六萬法歸一如衆七更釋無別此無四結勸修觀若有四以偈重頌二一標章爾時二正頌七一頌文殊啓問三世二頌總標心地我今三頌二利功深十方四頌廣演差別一切五頌正教心地是知六頌諸喻類釋心如七頌結勸修觀若能五助以神呪四一標舉說呪爾時二正說神呪唵室三呪印軌則爾時四較量功德勝於六菩提心印二一品題發菩二經文三一經家敘儀爾時二薄伽示衆五一如來許說發心大善二文殊述請銷疑爾時三佛示空法遣見三一法說佛告二喻說譬如三法合心空四更遣空病五一微釋除遣又善二歷病藥喻善男三以法合喻善男四結成正義善男五自覺四義二一標徵四義善男二凡聖二釋二一標定各二謂諸二分別凡聖三一凡夫二心善男二賢聖二心善男三結成四心善男五詳明觀印六一文殊問觀爾時二如來說與佛言三傳與真言唵菩四說呪威神此陀五群示觀儀善男六較量顯勝二一滅罪功德若有二獲禪功德二一標徵列名即獲二逐一釋義六一剎那三昧云何二微塵三昧云何三白縷三昧云何四起伏三昧云何五安住三昧云何六定成果德入此三聞品獲益爾時七究竟成佛二一品題成佛二經文八一經家敘置爾時二標列三密喻伽三逐一分別八一心祕密云何二口祕密云何三身祕密云何四教與印相善男五出印相名是名六教與觀相爾時七借喻比觀譬如八法合觀益凡夫四文殊稱讚爾時五甲胄喻觀三一略標名義爾時二徵名廣釋云何三結成福利文殊六文殊讚謝爾時七發願流通今者八聞品成益爾時三流通分二一品題囑纍二經文十三一如來告衆爾時二敘己修成我於三囑纍流通今以四說經妙益如是五喻同如意譬如六喻同天鼓亦如七較量顯勝二一文殊問福爾時二佛與較量四一七寶供佛功德爾時二四句流通功德若善三較量供福不及以彼四女衆流通功德二一正敘六種流布若有二更明現未之福二一後身不墮八難如是二現身十種勝福於現八在處應供文殊九滅後勝利四一法師同佛文殊二供師獲福若有三徵釋其義所以四供者佛記若有十報恩利益四一明報恩讀念若人二明獲福無邊如是三明諸天衛護是人四明增長慧辨如是十一臨終見佛二一明見佛三業不亂文殊二明三業各有十益三一明身業十種清淨初獲二明語業十種清淨次獲三明意業十種清淨次獲十二結囑生信此心十三海會奉行爾時
